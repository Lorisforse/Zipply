services:
  ziply_backend:
    build: .
    container_name: ziply_backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=ziply_db
      - DB_PORT=5432
      - DB_NAME=ziply_db
      - DB_USER=ziply_user
      - DB_PASSWORD=ziply_password
      - JWT_SECRET=change_me_in_production
      - GIN_MODE=release
      - PORT=8080
    depends_on:
      ziply_db:
        condition: service_healthy
    restart: unless-stopped

  ziply_db:
    image: postgres:15-alpine
    container_name: ziply_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ziply_db
      - POSTGRES_USER=ziply_user
      - POSTGRES_PASSWORD=ziply_password
    volumes:
      - ziply_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ziply_user -d ziply_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ziply_db_data:
