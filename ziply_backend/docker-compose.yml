services:
  backend:
    image: ziply-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ziply-backend
    restart: unless-stopped
    ports:
      - "8081:8080"
    # I valori vengono dal file .env iniettato dalla credenziale Jenkins
    # 'ziply-backend-env' (NON committare .env: vedi .gitignore).
    env_file:
      - .env
    networks:
      # Rete del database (Postgres ziply-postgres).
      - db_ziply-net
      # Rete del reverse proxy nginx: necessaria perché nginx raggiunga il backend.
      - nefta_webnet

networks:
  db_ziply-net:
    external: true
  nefta_webnet:
    external: true
