server {
    listen 80;
    server_name _;

    # API → backend. Il prefisso /api/ viene rimosso (proxy_pass con slash
    # finale): il backend Go monta le route a root (es. /operator/vehicles).
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA Flutter: serve i file statici con fallback su index.html.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
